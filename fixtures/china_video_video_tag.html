<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Sample Product Card with Video Tag</title>
</head>
<body>
  <h1>Bluetooth Earbuds</h1>
  <div class="main-media">
    <video src="https://cdn.example.com/video.mp4" controls poster="https://cdn.example.com/cover.jpg"></video>
  </div>
  <div class="thumbs">
    <img src="https://cdn.example.com/thumb1.jpg" alt="thumb1">
    <img src="https://cdn.example.com/thumb2.webp" alt="thumb2">
  </div>
</body>
</html>
