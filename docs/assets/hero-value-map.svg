<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#151e32"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .card { fill:url(#card); stroke-width:1.4; rx:12; }
      .text { fill:#e2e8f0; font-family:Segoe UI,Roboto,Arial,sans-serif; font-size:13px; }
      .title { fill:#f8fafc; font-weight:700; font-size:15px; }
      .subtitle { fill:#94a3b8; font-size:12px; }
      .section-title { fill:#ffffff; font-weight:700; font-size:14px; }
      .arrow { stroke:#64748b; stroke-width:2; fill:none; marker-end:url(#arr); }
      .arrow-accent { stroke:#38bdf8; stroke-width:2.5; fill:none; marker-end:url(#arr-accent); }
      .arrow-purple { stroke:#c084fc; stroke-width:2.5; fill:none; marker-end:url(#arr-purple); }
      .arrow-green { stroke:#34d399; stroke-width:2.5; fill:none; marker-end:url(#arr-green); }
      .engine { filter:url(#glow); }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arr-accent" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c084fc"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>

  <!-- Top hero banner -->
  <rect x="360" y="20" width="480" height="75" class="card engine" stroke="#334155"/>
  <text x="600" y="48" text-anchor="middle" class="title" font-size="18">WB Radar &amp; China Matcher</text>
  <text x="600" y="70" text-anchor="middle" class="subtitle">Desktop intelligence for WB sellers &amp; China sourcing</text>
  <text x="600" y="88" text-anchor="middle" class="subtitle">Python 3.11 • Flet • CLIP + pHash • LLM • Windows EXE</text>

  <!-- Section labels -->
  <text x="130" y="130" text-anchor="middle" class="section-title" fill="#38bdf8">INPUTS</text>
  <text x="600" y="130" text-anchor="middle" class="section-title" fill="#60a5fa">INTELLIGENCE ENGINE</text>
  <text x="1070" y="130" text-anchor="middle" class="section-title" fill="#34d399">OUTPUTS</text>

  <!-- INPUTS column -->
  <rect x="35" y="150" width="190" height="38" class="card" stroke="#38bdf8"/>
  <text x="130" y="174" text-anchor="middle" class="text">WB product link</text>

  <rect x="35" y="198" width="190" height="38" class="card" stroke="#38bdf8"/>
  <text x="130" y="222" text-anchor="middle" class="text">WB nmId</text>

  <rect x="35" y="246" width="190" height="38" class="card" stroke="#38bdf8"/>
  <text x="130" y="270" text-anchor="middle" class="text">Product photo</text>

  <rect x="35" y="294" width="190" height="38" class="card" stroke="#38bdf8"/>
  <text x="130" y="318" text-anchor="middle" class="text">WB niche query</text>

  <rect x="35" y="342" width="190" height="38" class="card" stroke="#38bdf8"/>
  <text x="130" y="366" text-anchor="middle" class="text">Review videos</text>

  <!-- ENGINE column -->
  <rect x="395" y="150" width="190" height="38" class="card engine" stroke="#60a5fa"/>
  <text x="490" y="174" text-anchor="middle" class="text">China Matcher</text>

  <rect x="395" y="198" width="190" height="38" class="card" stroke="#60a5fa"/>
  <text x="490" y="222" text-anchor="middle" class="text">CLIP + pHash ranking</text>

  <rect x="395" y="246" width="190" height="38" class="card" stroke="#60a5fa"/>
  <text x="490" y="270" text-anchor="middle" class="text">Viral detector</text>

  <rect x="395" y="294" width="190" height="38" class="card" stroke="#60a5fa"/>
  <text x="490" y="318" text-anchor="middle" class="text">Reviews collector</text>

  <rect x="395" y="342" width="190" height="38" class="card" stroke="#60a5fa"/>
  <text x="490" y="366" text-anchor="middle" class="text">VoC analyzer</text>

  <rect x="615" y="150" width="190" height="38" class="card" stroke="#60a5fa"/>
  <text x="710" y="174" text-anchor="middle" class="text">Hook generator</text>

  <rect x="615" y="198" width="190" height="38" class="card" stroke="#60a5fa"/>
  <text x="710" y="222" text-anchor="middle" class="text">Description writer</text>

  <rect x="615" y="246" width="190" height="38" class="card" stroke="#60a5fa"/>
  <text x="710" y="270" text-anchor="middle" class="text">Video downloader</text>

  <rect x="615" y="294" width="190" height="38" class="card" stroke="#60a5fa"/>
  <text x="710" y="318" text-anchor="middle" class="text">LLM providers</text>

  <rect x="615" y="342" width="190" height="38" class="card" stroke="#60a5fa"/>
  <text x="710" y="366" text-anchor="middle" class="text">Browser sessions</text>

  <!-- OUTPUTS column -->
  <rect x="975" y="150" width="190" height="38" class="card" stroke="#34d399"/>
  <text x="1070" y="174" text-anchor="middle" class="text">1:1 supplier candidates</text>

  <rect x="975" y="198" width="190" height="38" class="card" stroke="#34d399"/>
  <text x="1070" y="222" text-anchor="middle" class="text">Similarity score</text>

  <rect x="975" y="246" width="190" height="38" class="card" stroke="#34d399"/>
  <text x="1070" y="270" text-anchor="middle" class="text">Review insights</text>

  <rect x="975" y="294" width="190" height="38" class="card" stroke="#34d399"/>
  <text x="1070" y="318" text-anchor="middle" class="text">Pain / desires / fears</text>

  <rect x="975" y="342" width="190" height="38" class="card" stroke="#34d399"/>
  <text x="1070" y="366" text-anchor="middle" class="text">Hooks &amp; descriptions</text>

  <rect x="975" y="390" width="190" height="38" class="card" stroke="#34d399"/>
  <text x="1070" y="414" text-anchor="middle" class="text">Video assets</text>

  <rect x="975" y="438" width="190" height="38" class="card" stroke="#34d399"/>
  <text x="1070" y="462" text-anchor="middle" class="text">Windows EXE workflow</text>

  <!-- Arrows: inputs → engine -->
  <path d="M 225 169 L 395 169" class="arrow-accent"/>
  <path d="M 225 217 L 395 217" class="arrow-accent"/>
  <path d="M 225 265 L 395 265" class="arrow-accent"/>
  <path d="M 225 313 L 395 313" class="arrow-accent"/>
  <path d="M 225 361 L 395 361" class="arrow-accent"/>

  <!-- Arrows: engine → outputs -->
  <path d="M 805 169 L 975 169" class="arrow-purple"/>
  <path d="M 805 217 L 975 217" class="arrow-purple"/>
  <path d="M 805 265 L 975 265" class="arrow-purple"/>
  <path d="M 805 313 L 975 313" class="arrow-purple"/>
  <path d="M 805 361 L 975 361" class="arrow-purple"/>

  <!-- Down arrows from engine to GUI -->
  <path d="M 490 390 L 490 440" class="arrow-green"/>
  <path d="M 710 390 L 710 440" class="arrow-green"/>

  <!-- GUI section -->
  <text x="600" y="445" text-anchor="middle" class="section-title" fill="#6ee7b7">DESKTOP GUI</text>

  <rect x="260" y="465" width="200" height="52" class="card" stroke="#34d399"/>
  <text x="360" y="490" text-anchor="middle" class="title" fill="#6ee7b7">Матчер China</text>
  <text x="360" y="508" text-anchor="middle" class="subtitle">1:1 supplier matching</text>

  <rect x="500" y="465" width="200" height="52" class="card" stroke="#34d399"/>
  <text x="600" y="490" text-anchor="middle" class="title" fill="#6ee7b7">Разведка WB</text>
  <text x="600" y="508" text-anchor="middle" class="subtitle">Viral research &amp; VoC</text>

  <rect x="740" y="465" width="200" height="52" class="card" stroke="#34d399"/>
  <text x="840" y="490" text-anchor="middle" class="title" fill="#6ee7b7">Настройки</text>
  <text x="840" y="508" text-anchor="middle" class="subtitle">LLM, proxy, sessions</text>

  <!-- Footer -->
  <text x="600" y="560" text-anchor="middle" class="subtitle">One desktop workflow: find viral WB products, understand customer voice,</text>
  <text x="600" y="580" text-anchor="middle" class="subtitle">match 1:1 suppliers in China, extract videos, generate hooks and descriptions.</text>
  <text x="600" y="600" text-anchor="middle" class="subtitle">No captcha bypass. Secrets stay local. 620+ tests green.</text>
</svg>
