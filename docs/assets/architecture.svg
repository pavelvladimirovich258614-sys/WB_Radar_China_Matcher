<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a202c"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <style>
      .box { fill:#2d3748; stroke:#4a5568; stroke-width:1.5; rx:8; }
      .core { fill:#2c5282; stroke:#63b3ed; }
      .matcher { fill:#276749; stroke:#68d391; }
      .harvest { fill:#744210; stroke:#f6e05e; }
      .gui { fill:#553c9a; stroke:#b794f4; }
      .text { fill:#e2e8f0; font-family:Segoe UI,Roboto,Arial,sans-serif; font-size:13px; }
      .title { fill:#f7fafc; font-weight:600; font-size:15px; }
      .small { fill:#a0aec0; font-size:11px; }
      .arrow { stroke:#a0aec0; stroke-width:1.5; fill:none; marker-end:url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a0aec0"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="url(#bg)"/>

  <!-- Core -->
  <rect x="300" y="20" width="300" height="110" class="box core"/>
  <text x="450" y="45" text-anchor="middle" class="title">core/</text>
  <text x="450" y="70" text-anchor="middle" class="small">config • models • wb_public • browser</text>
  <text x="450" y="90" text-anchor="middle" class="small">llm providers • storage</text>
  <text x="450" y="110" text-anchor="middle" class="small">shared foundation, no duplication</text>

  <!-- Matcher -->
  <rect x="20" y="170" width="260" height="150" class="box matcher"/>
  <text x="150" y="195" text-anchor="middle" class="title">matcher/</text>
  <text x="150" y="220" text-anchor="middle" class="small">input resolver</text>
  <text x="150" y="240" text-anchor="middle" class="small">Alibaba / 1688 / Taobao drivers</text>
  <text x="150" y="260" text-anchor="middle" class="small">CLIP + pHash ranker</text>
  <text x="150" y="280" text-anchor="middle" class="small">China video extractor</text>

  <!-- Harvest -->
  <rect x="620" y="170" width="260" height="150" class="box harvest"/>
  <text x="750" y="195" text-anchor="middle" class="title">harvest/</text>
  <text x="750" y="220" text-anchor="middle" class="small">viral detector</text>
  <text x="750" y="240" text-anchor="middle" class="small">reviews collector</text>
  <text x="750" y="260" text-anchor="middle" class="small">VoC analyzer + hooks</text>
  <text x="750" y="280" text-anchor="middle" class="small">review videos + downloader</text>

  <!-- GUI -->
  <rect x="300" y="360" width="300" height="120" class="box gui"/>
  <text x="450" y="385" text-anchor="middle" class="title">gui/ — Flet desktop</text>
  <text x="450" y="410" text-anchor="middle" class="small">Матчер China • Разведка WB • Настройки</text>
  <text x="450" y="430" text-anchor="middle" class="small">DI-friendly controllers for tests</text>

  <!-- Arrows -->
  <path d="M 450 130 L 450 170" class="arrow"/>
  <path d="M 450 360 L 450 320" class="arrow"/>
  <path d="M 280 245 L 300 245" class="arrow"/>
  <path d="M 620 245 L 600 245" class="arrow"/>

  <!-- Labels -->
  <text x="450" y="155" text-anchor="middle" class="small">uses</text>
  <text x="450" y="340" text-anchor="middle" class="small">renders</text>
  <text x="340" y="235" text-anchor="middle" class="small">outputs</text>
  <text x="580" y="235" text-anchor="middle" class="small">outputs</text>
</svg>
